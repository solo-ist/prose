name: Bug Report
description: Report a bug in Prose
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please search existing issues before creating a new one.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should have happened...
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what happened instead...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Prose version, and any other relevant info
      placeholder: |
        - OS: macOS 15.x / Windows 11 / Linux
        - Prose version: x.x.x
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - AI / Chat
        - File Management
        - Settings
        - Integrations
        - Other
    validations:
      required: false
