name: Feature Request
description: Suggest a feature for Prose
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please search existing issues and
        [Ideas discussions](https://github.com/solo-ist/prose/discussions/categories/ideas)
        before creating a new one. Upvote existing requests with a thumbs-up reaction.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see in Prose?
      placeholder: Describe the feature...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature? What problem does it solve?
      placeholder: Describe your workflow...
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - AI / Chat
        - File Management
        - Settings
        - Integrations
        - Other
    validations:
      required: false
