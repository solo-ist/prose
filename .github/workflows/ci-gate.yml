name: CI Gate

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]

jobs:
  trigger-review:
    # E2E passed on a PR → trigger auto-review via /review comment
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.info('No PR associated with this workflow run');
              return;
            }
            core.setOutput('number', prs[0].number);

      - name: Check for duplicate or recent review
        if: steps.pr.outputs.number
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Fetch recent comments and check for dedup/debounce
          COMMENTS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.body | contains("<!-- ci-gate-sha:")) | {body, created_at}]')

          # 383-1: SHA dedup — skip if this commit was already reviewed
          SHA_EXISTS=$(echo "$COMMENTS" | jq --arg sha "$HEAD_SHA" \
            '[.[] | select(.body | contains("<!-- ci-gate-sha: " + $sha))] | length')
          if [ "$SHA_EXISTS" -gt 0 ]; then
            echo "::notice::SHA $HEAD_SHA already reviewed — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 383-3: Debounce — skip if a /review was posted within the last 10 minutes
          LATEST=$(echo "$COMMENTS" | jq -r 'sort_by(.created_at) | last | .created_at // empty')
          if [ -n "$LATEST" ]; then
            LATEST_TS=$(date -d "$LATEST" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$LATEST" +%s 2>/dev/null || echo 0)
            NOW_TS=$(date +%s)
            DIFF=$(( NOW_TS - LATEST_TS ))
            if [ "$DIFF" -lt 600 ]; then
              echo "::notice::Last /review was ${DIFF}s ago (< 600s) — debouncing"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Trigger auto-review
        if: steps.pr.outputs.number && steps.dedup.outputs.skip != 'true'
        env:
          # PROJECT_TOKEN required: github.token events don't trigger downstream
          # issue_comment workflows. claude.yml checks body content, not author.
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "/review <!-- ci-gate-sha: $HEAD_SHA -->

          *Auto-triggered after E2E tests passed.*"

  e2e-auto-fix:
    # E2E failed on a PR → post @claude fix request
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setFailed('No PR associated with this workflow run');
              return;
            }
            core.setOutput('number', prs[0].number);

      - name: Check fix attempt count
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          # 383-6: Count BOTH fix-attempt sentinel types (e2e + agent) as a unified breaker
          ATTEMPTS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.body | (contains("<!-- e2e-fix-attempt:") or contains("<!-- agent-fix-attempt:")))] | length')
          echo "attempts=$ATTEMPTS" >> "$GITHUB_OUTPUT"
          if [ "$ATTEMPTS" -ge 1 ]; then
            echo "::warning::E2E fix already attempted. Escalating."
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "<!-- e2e-fix-escalation -->
          ## E2E Auto-Fix Escalated

          E2E tests failed again after an auto-fix attempt. Escalating to human review.

          **Label applied:** \`needs-review\`"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-review"
          fi

      - name: Check if fork PR
        id: fork
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
              });
              const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
              core.setOutput('is_fork', isFork.toString());
              if (isFork) {
                core.info('Fork PR detected — skipping @claude auto-fix');
              }
            } else {
              core.setOutput('is_fork', 'false');
            }

      - name: Get failure logs
        if: steps.guard.outputs.attempts == '0' && steps.fork.outputs.is_fork != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null | tail -150 > /tmp/test-failures.txt || echo "Could not fetch failure logs" > /tmp/test-failures.txt

      - name: Post fix request
        if: steps.guard.outputs.attempts == '0' && steps.fork.outputs.is_fork != 'true'
        env:
          # PROJECT_TOKEN required: github.token events don't trigger downstream
          # issue_comment workflows. claude.yml checks body content, not author.
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          {
            echo "@claude E2E tests failed on this PR. Fix the failing tests or the code they test."
            echo ""
            echo "**[View full run]($RUN_URL)**"
            echo ""
            echo "<details>"
            echo "<summary>Test failure output</summary>"
            echo ""
            echo '```'
            cat /tmp/test-failures.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "## Instructions"
            echo "1. Read the test failure output above"
            echo "2. Look at the failing test files and the source code they test"
            echo "3. Determine whether the test or the source code needs fixing"
            echo "4. Fix the issue — prefer fixing source code over modifying tests"
            echo "5. Commit and push the fix to the current PR branch"
            echo ""
            echo "After fixing, post a comment with this sentinel on its own line:"
            echo '<!-- e2e-fix-attempt: 1 -->'
          } > /tmp/fix-request.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/fix-request.md
