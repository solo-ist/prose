name: Claude Code

on:
  # Automatic review on initial PR creation only
  pull_request:
    types: [opened]
  # Manual invocation via @claude mentions
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Automatic code review on PR open
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:
            - Code correctness and potential bugs
            - Security concerns
            - Performance implications

            Be concise. Only comment on significant issues - if the code looks good, say so briefly.

            IMPORTANT: Post your review as a PR comment using `gh pr comment ${{ github.event.pull_request.number }}`
            Do not just output text - you must use the gh command to post your feedback.

  # Manual invocation via @claude mentions
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: '--max-turns 50 --allowedTools "Read,Write,Edit,Glob,Grep,Bash,TodoWrite"'
          prompt: |
            You are an autonomous coding agent. Read the issue and implement the requested changes.

            ## Instructions
            1. Read CLAUDE.md for project conventions (commit format, branch naming)
            2. Create a feature branch from the current HEAD
            3. Implement the changes described in the issue
            4. Commit your work with conventional commit messages
            5. Push the branch and open a pull request using `gh pr create`

            ## PR requirements
            - Title: conventional commit format (e.g., "feat(editor): add table support")
            - Body: reference the issue with "Fixes #<number>", include summary and test plan

            ## Important
            - You MUST use tools to read files, write code, and run commands
            - Do NOT just describe what you would do — actually do it
            - If the issue is a question (not implementation work), post a comment with your answer using `gh issue comment`
