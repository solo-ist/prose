name: Claude Code

on:
  # Auto-review is gated behind E2E tests — see ci-gate.yml
  # /review comments still trigger auto-review directly (manual override)
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Automatic code review on PR open, or on-demand via /review comment
  auto-review:
    # /review always routes here, even if combined with @claude
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check commenter permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(`User ${context.payload.comment.user.login} lacks write access`);
            }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: '/review'
          allowed_bots: 'claude,github-actions'
          show_full_output: true
          claude_args: '--dangerously-skip-permissions'
          prompt: |
            You are a code reviewer. Review PR #${{ github.event.issue.number }} in this repository.

            ## Steps
            1. Get the PR diff: `gh pr diff ${{ github.event.issue.number }}`
            2. Read any files that need deeper context
            3. Write your review
            4. Post your review as a PR comment using: `gh pr comment ${{ github.event.issue.number }} --body '<your review>'`

            You MUST post your review as a comment — do not just return it as output.
            Prefix your comment with `## Code Review` so downstream automation can find it.

            ## Review focus
            - Code correctness and potential bugs
            - Security concerns
            - Performance implications

            ## E2E Test Conventions (e2e/*.spec.ts, e2e/shared.ts)

            When reviewing Playwright e2e tests, be aware of these codebase idioms:

            - **Fixture data is hardcoded.** Web-mode tests reference file names ("Welcome to Prose",
              "Meeting Notes", "Q1 Planning", etc.) defined in `src/renderer/mocks/fixtures/index.ts`.
              Hardcoded fixture names in tests are expected — do NOT flag them as magic strings.
            - **Shared page instance.** Tests share a single `Page` via `test.beforeAll`. This is
              intentional for performance and to test cumulative state. Tests should still be resilient
              to prior-test failure via guard checks (e.g., `if (!(await el.isVisible())) { open it }`).
            - **Prefer Playwright auto-waiting over `waitForTimeout`.** Use `expect().toBeVisible()`,
              `waitForSelector`, or `toHaveAttribute` with timeouts instead of arbitrary `waitForTimeout`
              calls. Only use `waitForTimeout` when no observable state change exists to wait on.
            - **Onboarding dialogs.** The app shows onboarding dialogs on first launch AND after
              `page.reload()`. The `dismissOnboarding()` helper in `shared.ts` must be called in both
              `beforeAll` and after any reload to prevent overlay-blocked interactions.
            - **Selectors use `aria-label` and `data-testid`.** Multi-state buttons use comma-separated
              selectors (e.g., `'[aria-label="Show chat"], [aria-label="Hide chat"]'`). This is correct.

            ## Electron Security Checklist

            As part of your review, check for these Electron-specific security concerns:
            - [ ] `nodeIntegration` must remain `false` in all BrowserWindow configs
            - [ ] `contextIsolation` must remain `true` in all BrowserWindow configs
            - [ ] No new APIs exposed through preload without input validation
            - [ ] `shell.openExternal()` calls validate URLs (no arbitrary protocol handlers)
            - [ ] IPC handlers validate and sanitize all arguments from renderer
            - [ ] No secrets, API keys, or tokens hardcoded in source
            - [ ] Dependencies checked for known CVEs (if new deps added)
            - [ ] Content Security Policy not weakened

            If the PR touches privilege-boundary files (`src/main/**`, `src/preload/**`, `electron-builder.*`, `electron.vite.config.*`), prepend your review with:
            (NOTE: This list is duplicated in run-pe-analysis.mjs — keep both in sync)

            > **[SECURITY GATE]** This PR modifies Electron privilege-boundary code. Requires human review regardless of other findings.

            Be concise. Only comment on significant issues - if the code looks good, say so briefly.

            ## Verdict

            After your review, append exactly ONE of these HTML comment trailers on its own line at the very end of your comment:

            - If no significant issues found: `<!-- review-verdict: clean -->`
            - If any bugs, security issues, or significant concerns found: `<!-- review-verdict: issues-found -->`

            This trailer is machine-readable and drives the downstream triage pipeline. Always include it.

      # 383-4: Ensure verdict trailer is always present. If the LLM response was
      # truncated or omitted the trailer, append a safe default to prevent fallback
      # to the legacy review-feedback analysis path.
      - name: Verify verdict trailer
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # Find the most recent claude[bot] comment with ## Code Review
          COMMENT=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]" and (.body | contains("## Code Review")))] | last')

          if [ -z "$COMMENT" ] || [ "$COMMENT" = "null" ]; then
            echo "::notice::No Code Review comment found — nothing to verify"
            exit 0
          fi

          BODY=$(echo "$COMMENT" | jq -r '.body')
          COMMENT_ID=$(echo "$COMMENT" | jq -r '.id')

          if echo "$BODY" | grep -q '<!-- review-verdict:'; then
            echo "::notice::Verdict trailer present — no action needed"
          else
            echo "::warning::Verdict trailer MISSING — appending safe default (issues-found)"
            PATCHED="${BODY}

          <!-- review-verdict: issues-found -->"
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f body="$PATCHED"
          fi

  # Manual invocation via @claude mentions
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Check actor permissions
        uses: actions/github-script@v7
        with:
          script: |
            // Determine the actor based on event type
            let username;
            if (context.eventName === 'issues') {
              username = context.payload.issue.user.login;
            } else if (context.eventName === 'pull_request_review') {
              username = context.payload.review.user.login;
            } else {
              username = context.payload.comment.user.login;
            }
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username,
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(`User ${username} lacks write access`);
            }

      # 383-8: Concurrency guard — prevent multiple @claude agents on the same PR/issue.
      # Best-effort: narrow race window exists between check and run start.
      - name: Check for concurrent claude runs
        id: concurrency
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN: ${{ github.run_id }}
        run: |
          IN_PROGRESS=$(gh run list --repo "$REPO" --workflow claude.yml \
            --json databaseId,status \
            --jq "[.[] | select((.status == \"in_progress\" or .status == \"queued\") and .databaseId != ($CURRENT_RUN | tonumber))] | length")
          if [ "$IN_PROGRESS" -gt 0 ]; then
            echo "::warning::Another claude.yml run is active ($IN_PROGRESS queued/in-progress). Skipping to prevent concurrent agent collision."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.concurrency.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        if: steps.concurrency.outputs.skip != 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: 'github-actions'
          show_full_output: true
          claude_args: '--dangerously-skip-permissions'
          prompt: |
            You are an autonomous coding agent. Implement the changes described in the
            GitHub issue or comment that triggered this workflow. Do NOT list or browse
            other issues — the action has already provided the relevant context.

            ## Instructions
            1. Read CLAUDE.md for project conventions (commit format, branch naming)
            2. Create a feature branch: `git checkout -b issue-<number>-<description>`
            3. Implement the requested changes
            4. Commit with conventional commit messages
            5. Push and open a PR: `gh pr create`

            ## PR format
            - Title: conventional commit (e.g., "feat(editor): add table support")
            - Body: "Fixes #<issue-number>", summary, and test plan

            ## Important
            - You MUST use tools (Read, Edit, Write, Bash) — do not just describe work
            - ALWAYS post your response using `gh issue comment <number> --body '...'` or
              `gh pr comment <number> --body '...'`. The action's built-in comment posting
              is unreliable. Post your own comment explicitly as the last step.
            - If the trigger is a question (not implementation), reply with `gh issue comment`
