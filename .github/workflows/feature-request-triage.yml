name: Feature Request Triage

on:
  issues:
    types: [labeled]

jobs:
  add-to-project:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    steps:
      - name: Add to project and set status
        env:
          # Fine-grained PAT scoped to solo-ist/prose with:
          #   - Issues: Read
          #   - Projects: Read and write
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          set -e

          # Add issue to Prose Roadmap project
          ITEM_ID=$(gh project item-add 5 --owner solo-ist \
            --url "${{ github.event.issue.html_url }}" \
            --format json --jq '.id')
          if [ -z "$ITEM_ID" ]; then
            echo "::error::Failed to add issue to project"
            exit 1
          fi

          # Look up "User Requested" option ID dynamically
          OPTION_ID=$(gh api graphql -f query='{
            node(id: "PVTSSF_lADOC6voP84BPTiXzg9wHj8") {
              ... on ProjectV2SingleSelectField {
                options { id name }
              }
            }
          }' --jq '.data.node.options[] | select(.name == "User Requested") | .id')
          if [ -z "$OPTION_ID" ]; then
            echo "::error::'User Requested' status option not found in project"
            exit 1
          fi

          # Set status to "User Requested"
          gh project item-edit \
            --project-id PVT_kwDOC6voP84BPTiX \
            --id "$ITEM_ID" \
            --field-id PVTSSF_lADOC6voP84BPTiXzg9wHj8 \
            --single-select-option-id "$OPTION_ID"
