name: Pipeline Triage

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to triage'
        required: true
        type: number

jobs:
  # 383-2: Short-circuit when review contains [SECURITY GATE] — skip scorer+PE,
  # go straight to hitl-full. PRs touching privilege-boundary files always route
  # hitl-full regardless of score, so running scorer+PE is pure API waste.
  security-gate-check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'claude[bot]' &&
        contains(github.event.comment.body, '<!-- review-verdict: issues-found -->')
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    outputs:
      shortcircuit: ${{ steps.check.outputs.shortcircuit }}
    steps:
      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for security gate in review
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REVIEW=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '[.[] | select(.user.login == "claude[bot]" and (.body | contains("<!-- review-verdict: issues-found -->")))] | last | .body')
          else
            REVIEW="$COMMENT_BODY"
          fi

          if echo "$REVIEW" | grep -q '\[SECURITY GATE\]'; then
            echo "::notice::Security gate detected — short-circuiting to hitl-full (skipping scorer+PE)"
            echo "shortcircuit=true" >> "$GITHUB_OUTPUT"
          else
            echo "shortcircuit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post hitl-full verdict (security gate shortcircuit)
        if: steps.check.outputs.shortcircuit == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "<!-- scorer-output-comment -->
          <!-- pe-output-comment -->
          <!-- orchestrator-verdict: hitl-full -->
          ## Pipeline Triage — Security Gate Short-Circuit

          This PR touches privilege-boundary files. Scorer and PE analysis skipped — \`hitl-full\` verdict applied directly.

          > **[SECURITY GATE]** Privilege-boundary PRs always route to full human review.

          **Verdict:** \`hitl-full\`
          **Labels:** \`complex\`, \`needs-review\`"

      - name: Apply labels (security gate shortcircuit)
        if: steps.check.outputs.shortcircuit == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "complex" --repo "$REPO" --color "D93F0B" --description "Complex changes requiring full review" --force || true
          gh label create "needs-review" --repo "$REPO" --color "FBCA04" --description "Awaiting human review" --force || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "complex,needs-review"

  run-scorer:
    needs: [security-gate-check]
    # Skip if security gate fired — verdict already posted
    if: >-
      needs.security-gate-check.outputs.shortcircuit != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          github.event.comment.user.login == 'claude[bot]' &&
          contains(github.event.comment.body, '<!-- review-verdict: issues-found -->')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing scorer output
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          SENTINEL="<!-- scorer-output:"
          COUNT=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"$SENTINEL\")))] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "::notice::Scorer output already exists ($COUNT comment(s)). Skipping to prevent duplicate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch review comment
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '[.[] | select(.user.login == "claude[bot]" and (.body | contains("<!-- review-verdict: issues-found -->")))] | last | .body' \
              > /tmp/review-comment.txt
          else
            printf '%s' "$COMMENT_BODY" > /tmp/review-comment.txt
          fi

      - name: Run scorer
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/run-scorer.mjs

      - name: Post scorer comment
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body-file /tmp/scorer-output.md

  run-pe-analysis:
    needs: [security-gate-check]
    # Skip if security gate fired — verdict already posted
    if: >-
      needs.security-gate-check.outputs.shortcircuit != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          github.event.comment.user.login == 'claude[bot]' &&
          contains(github.event.comment.body, '<!-- review-verdict: issues-found -->')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PE output
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          SENTINEL="<!-- pe-output:"
          COUNT=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"$SENTINEL\")))] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "::notice::PE output already exists ($COUNT comment(s)). Skipping to prevent duplicate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch review comment and changed files
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '[.[] | select(.user.login == "claude[bot]" and (.body | contains("<!-- review-verdict: issues-found -->")))] | last | .body' \
              > /tmp/review-comment.txt
          else
            printf '%s' "$COMMENT_BODY" > /tmp/review-comment.txt
          fi

          # Fetch changed files with patches for PE analysis
          gh api "repos/$REPO/pulls/$PR_NUMBER/files" \
            --jq '.[] | "--- " + .filename + " (" + .status + ") ---\n" + (.patch // "(binary or too large)")' \
            > /tmp/changed-files.txt

      - name: Run PE analysis
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/run-pe-analysis.mjs

      - name: Post PE analysis comment
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body-file /tmp/pe-output.md

  orchestrate:
    needs: [security-gate-check, run-scorer, run-pe-analysis]
    # Only run if security gate did NOT fire and both scorer+PE succeeded
    if: >-
      always() &&
      needs.security-gate-check.outputs.shortcircuit != 'true' &&
      needs.run-scorer.result == 'success' &&
      needs.run-pe-analysis.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: write          # needed for gh workflow run (direct dispatch)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch scorer and PE outputs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          # Get all comments and extract scorer + PE outputs
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" or .user.login == "claude[bot]")] | .[] | .body' \
            > /tmp/all-comments.txt

      - name: Run orchestrator
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/run-orchestrator.mjs

      - name: Post orchestrator verdict
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body-file /tmp/orchestrator-output.md

      - name: Dispatch auto-fix if routed
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          VERDICT=$(cat /tmp/orchestrator-verdict.txt)
          if [ "$VERDICT" = "auto-fix" ] || [ "$VERDICT" = "auto-fix-verify" ]; then
            # Circuit breaker: only dispatch once per PR
            LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
            if echo "$LABELS" | grep -q "auto-fix-dispatched"; then
              echo "::warning::Auto-fix already dispatched for this PR. Skipping to prevent loop."
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "<!-- auto-fix-circuit-breaker -->
          > **Auto-fix cycle exhausted.** A fix was already attempted for this PR. Escalating to human review."
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-review"
            else
              echo "Dispatching pipeline-fix.yml for PR #$PR_NUMBER (verdict: $VERDICT)"
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-fix-dispatched"
              gh workflow run pipeline-fix.yml \
                --repo "$REPO" \
                -f pr_number="$PR_NUMBER"
            fi
          else
            echo "Verdict '$VERDICT' does not require auto-fix dispatch."
          fi

      - name: Ensure pipeline labels exist
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "auto-fix-queued" --repo "$REPO" --color "0E8A16" --description "Queued for automated fix" --force || true
          gh label create "auto-fix-dispatched" --repo "$REPO" --color "1D76DB" --description "Auto-fix workflow dispatched" --force || true
          gh label create "complex" --repo "$REPO" --color "D93F0B" --description "Complex changes requiring full review" --force || true
          gh label create "needs-review" --repo "$REPO" --color "FBCA04" --description "Awaiting human review" --force || true

      - name: Apply labels
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          VERDICT=$(cat /tmp/orchestrator-verdict.txt)
          case "$VERDICT" in
            auto-fix)
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-fix-queued"
              ;;
            auto-fix-verify)
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "auto-fix-queued,needs-review"
              ;;
            hitl-light)
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-review"
              ;;
            hitl-full)
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "complex,needs-review"
              ;;
          esac
