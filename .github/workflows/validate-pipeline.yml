name: Validate Pipeline

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pipeline validation
        run: bash .github/scripts/validate-pipeline.sh
