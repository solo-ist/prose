name: Web E2E Tests

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  web-e2e:
    if: |
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.labels.*.name, 'accelerated') ||
          github.event.pull_request.user.login == 'claude[bot]'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/test') &&
        !contains(github.event.comment.body, '@claude')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: npm run build:web

      - name: Run web E2E tests
        run: npx playwright test --config playwright.web.config.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-e2e-results
          path: |
            test-results-web.json
            test-results/

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'passed' : 'failed';
            const emoji = status === 'passed' ? ':white_check_mark:' : ':x:';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Web E2E Tests ${emoji}\n\nStatus: **${status}**\n\n[View run](${runUrl})`,
            });

      - name: Set commit status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: status,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `Web E2E tests ${status === 'success' ? 'passed' : 'failed'}`,
              context: 'web-e2e',
            });
