appId: ist.solo.prose
productName: Prose
buildVersion: "16"
directories:
  buildResources: build
  output: dist

afterPack: build/afterPack.cjs

publish:
  provider: github
  owner: solo-ist
  repo: prose

files:
  - out/**/*

extraResources:
  - from: out/mcp-stdio.cjs
    to: mcp-stdio.cjs
  - from: resources/
    to: resources/
    filter:
      - "!PrivacyInfo.xcprivacy"
  - from: resources/PrivacyInfo.xcprivacy
    to: PrivacyInfo.xcprivacy

fileAssociations:
  - ext:
      - md
      - markdown
      - mdown
      - mkd
    name: Markdown Document
    description: Markdown document
    role: Editor
    rank: Default

mac:
  category: public.app-category.productivity
  identity: Developer ID Application
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
    - dir
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    UTImportedTypeDeclarations:
      - UTTypeIdentifier: net.daringfireball.markdown
        UTTypeDescription: Markdown Document
        UTTypeConformsTo:
          - public.plain-text
        UTTypeTagSpecification:
          public.filename-extension:
            - md
            - markdown
            - mdown
            - mkd
          public.mime-type: text/markdown

mas:
  category: public.app-category.productivity
  identity: 8PT2Y7QQ2F
  provisioningProfile: build/Prose_Distribution.provisionprofile
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false
  target:
    - mas
  files:
    - "!node_modules/@sentry/cli-darwin/**"
    - "!node_modules/@sentry/cli/**"
    - "!node_modules/electron-updater/**"
    - "!node_modules/builder-util-runtime/**"

masDev:
  identity: Apple Development
  provisioningProfile: build/Prose_Development.provisionprofile

win:
  target:
    - nsis

linux:
  target:
    - AppImage
  category: Office
