<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  .prose-diff {
    --bg: #ffffff;
    --text: #1a1a1a;
    --border: #e4e4e7;
    --muted: #71717a;
    --surface: #f4f4f5;
    --removed-bg: #fecaca;
    --removed-fg: #7f1d1d;
    --added-bg: #bbf7d0;
    --added-fg: #14532d;
    font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    max-width: 820px;
  }
  @media (prefers-color-scheme: dark) {
    .prose-diff {
      --bg: #18181b;
      --text: #fafafa;
      --border: #3f3f46;
      --muted: #a1a1aa;
      --surface: rgba(255, 255, 255, 0.04);
      --removed-bg: rgba(239, 68, 68, 0.30);
      --removed-fg: #fecaca;
      --added-bg: rgba(34, 197, 94, 0.30);
      --added-fg: #bbf7d0;
    }
  }
  .prose-diff__columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .prose-diff__col { display: flex; flex-direction: column; min-width: 0; }
  .prose-diff__label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .prose-diff__block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    background: var(--bg);
    flex: 1;
  }
  .prose-diff__text {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
  }
  .prose-diff__removed {
    background: var(--removed-bg);
    color: var(--removed-fg);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    padding: 0 2px;
    border-radius: 3px;
  }
  .prose-diff__added {
    background: var(--added-bg);
    color: var(--added-fg);
    padding: 0 2px;
    border-radius: 3px;
  }
  .prose-diff__comment {
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .prose-diff__footer {
    font-size: 12px;
    color: var(--muted);
  }
</style>
<div class="prose-diff">
  <div class="prose-diff__columns">
    <div class="prose-diff__col">
      <div class="prose-diff__label">Original</div>
      <div class="prose-diff__block">
        <pre class="prose-diff__text">{{OLD_TEXT}}</pre>
      </div>
    </div>
    <div class="prose-diff__col">
      <div class="prose-diff__label">Suggested</div>
      <div class="prose-diff__block">
        <pre class="prose-diff__text">{{NEW_TEXT}}</pre>
      </div>
    </div>
  </div>
  {{COMMENT_BLOCK}}
  <div class="prose-diff__footer">Accept or reject in Prose's diff overlay.</div>
</div>

<!--
  OLD_TEXT / NEW_TEXT
    The full original / suggested text with inline diff markup. HTML-escape & < > " in
    literal text first, THEN wrap the changed runs:
      OLD_TEXT — wrap removed runs with <span class="prose-diff__removed">…</span>
      NEW_TEXT — wrap added runs with <span class="prose-diff__added">…</span>
    Unchanged surrounding text is identical between the two columns and stays unmarked,
    so the eye can skim to the differences. For whole-paragraph rewrites where every
    word changed, marking the entire text as one span is acceptable — the visual signal
    is "this whole block was rewritten".
    Granularity is word-level (a token of word characters or a contiguous punctuation
    run); avoid character-level marking inside words.

  COMMENT_BLOCK
    Empty string when no comment was passed to suggest_edit. When present, render as:
      <div class="prose-diff__comment">{{COMMENT}}</div>
    where COMMENT is HTML-escaped.
-->
