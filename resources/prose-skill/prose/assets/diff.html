<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  .prose-diff {
    --bg: #ffffff;
    --text: #1a1a1a;
    --border: #e4e4e7;
    --muted: #71717a;
    --surface: #f4f4f5;
    --removed-bg: #fef2f2;
    --removed-border: #fecaca;
    --added-bg: #f0fdf4;
    --added-border: #bbf7d0;
    font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    max-width: 720px;
  }
  @media (prefers-color-scheme: dark) {
    .prose-diff {
      --bg: #18181b;
      --text: #fafafa;
      --border: #3f3f46;
      --muted: #a1a1aa;
      --surface: rgba(255, 255, 255, 0.04);
      --removed-bg: rgba(239, 68, 68, 0.10);
      --removed-border: rgba(239, 68, 68, 0.30);
      --added-bg: rgba(34, 197, 94, 0.10);
      --added-border: rgba(34, 197, 94, 0.30);
    }
  }
  .prose-diff__label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .prose-diff__block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .prose-diff__block--removed { background: var(--removed-bg); border-color: var(--removed-border); }
  .prose-diff__block--added { background: var(--added-bg); border-color: var(--added-border); }
  .prose-diff__text {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
  }
  .prose-diff__comment {
    margin-top: 4px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .prose-diff__footer {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
<div class="prose-diff">
  <div>
    <div class="prose-diff__label">Original</div>
    <div class="prose-diff__block prose-diff__block--removed">
      <pre class="prose-diff__text">{{OLD_TEXT}}</pre>
    </div>
  </div>
  <div>
    <div class="prose-diff__label">Suggested</div>
    <div class="prose-diff__block prose-diff__block--added">
      <pre class="prose-diff__text">{{NEW_TEXT}}</pre>
    </div>
  </div>
  {{COMMENT_BLOCK}}
  <div class="prose-diff__footer">Accept or reject in Prose's diff overlay.</div>
</div>

<!--
  COMMENT_BLOCK: empty string when no comment was passed to suggest_edit. When present, render as:

  <div class="prose-diff__comment">{{COMMENT}}</div>

  OLD_TEXT / NEW_TEXT / COMMENT: HTML-escape & < > " before substituting.
-->
