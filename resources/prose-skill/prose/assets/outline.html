<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  .prose-outline {
    --bg: #ffffff;
    --text: #1a1a1a;
    --border: #e4e4e7;
    --muted: #71717a;
    font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    max-width: 720px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    background: var(--bg);
  }
  @media (prefers-color-scheme: dark) {
    .prose-outline {
      --bg: #18181b;
      --text: #fafafa;
      --border: #3f3f46;
      --muted: #a1a1aa;
    }
  }
  .prose-outline__label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .prose-outline__item {
    padding: 3px 0;
    color: var(--text);
    font-size: 13px;
  }
</style>
<div class="prose-outline">
  <div class="prose-outline__label">Outline</div>
  {{HEADING_ITEMS}}
</div>

<!--
  HEADING_ITEMS
    One of these per entry in the outline array. INDENT is (level - 1) * 16. Escape & < > " in TEXT.
      <div class="prose-outline__item" style="padding-left: {{INDENT}}px;">{{TEXT}}</div>
-->
