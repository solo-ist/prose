<div style="font-family: system-ui, -apple-system, sans-serif; font-size: 14px; padding: 12px; border-radius: 8px; background: #f8f9fa; color: #1a1a1a; max-width: 600px;">
  <div style="font-weight: 600; margin-bottom: 8px; color: #5a6065; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;">Document Outline</div>
  {{HEADING_ITEMS}}
</div>

<!--
  HEADING_ITEMS: one of these per entry in the outline array. INDENT is (level - 1) * 16. Escape & < > " in TEXT.

  <div style="padding-left: {{INDENT}}px; padding-top: 3px; padding-bottom: 3px; color: #1a1a1a; font-size: 14px;">{{TEXT}}</div>
-->
